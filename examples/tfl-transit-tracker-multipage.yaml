## TfL Transit Tracker – Multi-page example
##
## This example extends the base transit tracker to show TWO pages of
## upcoming trips (trips 1–3 on the base transit_schedule page, then
## trips 4–6 on an additional transit_page_2), followed by the clock
## page already defined in the base package.
##
## The base package defines: transit_schedule, clock_page
## This config modifies transit_schedule to show explicit page 0,
## and appends transit_page_2 for page 1.
##
## Page rotation (5s interval): transit_schedule → clock → transit_page_2 → …
##
## Key config: request_trips must be >= 2 × limit to fill both pages.

substitutions:
  name: transit-tracker
  friendly_name: Transit Tracker
  project_version: "dev"

esphome:
  name: ${name}
  name_add_mac_suffix: true
  friendly_name: ${friendly_name}
  project:
    name: "a10kiloham.Transit Tracker"
    version: ${project_version}

ota:
  - platform: esphome

packages:
  a10kiloham.Transit Tracker: github://a10kiloham/transit-tracker/firmware/transit-tracker.yaml@main

external_components:
  - source: github://avwuff/ESPHome-HUB75-MatrixDisplayWrapper@4fc1f26500b97a39693cd8af4ba2abb75f83ce0b
    refresh: 0s
    components: [ hub75 ]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

color:
  - id: my_red
    hex: "F50046"
  - id: my_green
    hex: "20FF00"
  - id: my_orange
    hex: "ff5900"
  - id: numbered_yellow
    hex: "FFD700"
  - id: headsign_white
    hex: "E0E0E0"
  - id: time_grey
    hex: "B0B0B0"
  - id: realtime_green
    hex: "20FF01"

transit_tracker:
  id: tracker
  base_url: "wss://tfl.xdca.com/"
  time_display: "arrival"
  show_units: "long"
  list_mode: "sequential"
  scroll_headsigns: true
  default_route_color: my_orange
  headsign_color: my_orange
  route_display: numbered
  numbered_color: numbered_yellow
  realtime_color: my_red
  show_realtime_icon: false
  limit: 3
  request_trips: 6  # Fetch enough trips to fill both pages (2 × limit)
  stops:
    - stop_id: "tfl:940GZZLUHTD"
      routes:
        - "tfl:northern-outbound"
        - "tfl:northern-inbound"
  styles:
    - route_id: "tfl:northern-outbound"
      name: ""
      color: my_orange
    - route_id: "tfl:northern-inbound"
      name: ""
      color: my_red

# Extend the base display to add a second transit page.
# The base package already defines transit_schedule and clock_page,
# so we use !extend on those IDs to modify them in-place rather than
# redefining them (which would cause a duplicate ID error).
display:
  - id: !extend matrix
    pages:
      - id: !extend transit_schedule
        lambda: |-
          id(tracker).draw_schedule(0);
      - id: !extend clock_page
        lambda: |-
          int x = it.get_width() / 2;
          int y = it.get_height() / 2;
          it.strftime(x, y / 2, id(pixolletta), COLOR_ON, TextAlign::CENTER, "%r", id(sntp_time).now());
          it.strftime(x, y + (y / 2), id(pixolletta), COLOR_ON, TextAlign::CENTER, "%B %d, %Y", id(sntp_time).now());
      - id: transit_page_2
        lambda: |-
          id(tracker).draw_schedule(1);

# Rotate pages every 5 seconds.
# Page order: transit_schedule (page 0) → clock_page → transit_page_2 (page 1) → …
interval:
  - interval: 5s
    then:
      - display.page.show_next: matrix
      - component.update: matrix
